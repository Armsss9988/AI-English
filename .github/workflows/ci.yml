name: CI

on:
  push:
    branches:
      - main
      - "feat/**"
      - "fix/**"
      - "chore/**"
  pull_request:

jobs:
  verify:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.18.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Schemathesis
        run: python -m pip install schemathesis==4.15.2

      - name: Check formatting
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Workspace tests
        run: pnpm test:workspace

      - name: Unit tests
        run: pnpm test:unit

      - name: Business tests
        run: pnpm test:business

      - name: API tests
        run: pnpm test:api

      - name: Architecture tests
        run: pnpm test:architecture

      - name: Schemathesis API contract test
        run: pnpm test:schemathesis
